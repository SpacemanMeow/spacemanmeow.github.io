# The Site Configuration

# Import the theme
theme: jekyll-theme-chirpy

# 语言配置（Chirpy 官方写法）
# 如需多语言，需在 _data/locales 目录添加对应语言文件（如 zh-CN.yml）
lang: en  # 主语言，可选 en / zh-CN / 其他支持的语言

# 时区（必填，避免时间显示错误）
timezone: Asia/Shanghai

# jekyll-seo-tag 核心 SEO 配置
title: Meow Apps Studio # 站点主标题（搜索结果核心）
tagline: Focus on creating beautiful and elegant applications. # 副标题（补充标题）
description: >-
  This is the blog of Meow Apps Studio. I share insights on app recommendations,
  practical development tutorials, coding experience, and idea exchanges.
  Our featured apps include Money Manager Budget Tracker, Cpu Monitor Temperature,
  Flip Desktop Clock, Habit Tracker, and Todo List Task Manager.
  Feedback and discussions are always welcome! # 精简至 150 字内，适配 SEO 摘要

# 站点根 URL（必填，无末尾斜杠）
url: "https://spacemanmeow.github.io"

# 作者信息（SEO & 版权用）
author:
  name: "spacemanmeow"
  email: "spaceman.app.studio@gmail.com"
  url: "https://spacemanmeow.github.io"

# 社交账号（SEO & 侧边栏展示）
github:
  username: SpacemanMeow
twitter:
  username: SpacemanMeow
social:
  name: SpacemanMeow
  email: spaceman.app.studio@gmail.com
  fediverse_handle:
  links:
    - https://twitter.com/SpacemanMeow
    - https://github.com/SpacemanMeow

# 搜索引擎验证（提升收录效率）
webmaster_verifications:
  google: "" # 替换为 Google Search Console 验证码
  bing: "" # 替换为 Bing 验证码
  baidu: "" # 替换为百度搜索资源平台验证码

# 网站分析（可选，统计访问数据）
analytics:
  google:
    id: "" # 替换为 Google Analytics ID（G-XXXXXXXXXX）
  cloudflare:
    id: "" # 可选，Cloudflare 分析 ID

# 页面访问量统计（可选）
pageviews:
  provider: "" # 推荐填 goatcounter（需先注册）

# 主题模式（跟随系统/强制亮色/暗色）
theme_mode: "" # 留空=跟随系统，可选 light / dark

# CDN 配置（可选，加速静态资源）
cdn: ""

# 侧边栏头像（必填，提升品牌感）
avatar: /assets/images/avatar.png # 建议放在 assets/images 目录，支持 PNG/JPG

# 社交分享预览图（SEO 关键）
social_preview_image: /assets/images/social-preview.png # 建议尺寸 1200x630px

# 文章目录全局开关
toc: true

# 评论系统（推荐 Giscus，基于 GitHub Discussions）
comments:
  provider: giscus # 替换为 giscus（推荐）/ utterances / disqus
  giscus:
    repo: SpacemanMeow/spacemanmeow.github.io # 替换为你的仓库（owner/repo）
    repo_id: "" # 在 Giscus 官网生成
    category: "General" # 你的 GitHub Discussions 分类
    category_id: "" # 在 Giscus 官网生成
    mapping: pathname
    strict: 0
    input_position: bottom
    lang: en

# PWA 配置（开启离线访问）
pwa:
  enabled: true
  cache:
    enabled: true
    deny_paths: []

# 分页配置
paginate: 10

# 站点基础路径（自定义域名留空）
baseurl: ""

# ------------------ 以下无需修改 ------------------
kramdown:
  footnote_backlink: "&#8617;&#xfe0e;"
  syntax_highlighter: rouge
  syntax_highlighter_opts:
    css_class: highlight
    span:
      line_numbers: false
    block:
      line_numbers: true
      start_line: 1

collections:
  tabs:
    output: true
    sort_by: order

defaults:
  - scope:
      path: ""
      type: posts
    values:
      layout: post
      comments: true
      toc: true
      permalink: /posts/:title/ # SEO 友好的永久链接
  - scope:
      path: _drafts
    values:
      comments: false
  - scope:
      path: ""
      type: tabs
    values:
      layout: page
      permalink: /:title/

sass:
  style: compressed

compress_html:
  clippings: all
  comments: all
  endings: all
  profile: false
  blanklines: false
  ignore:
    envs: [development]

exclude:
  - "*.gem"
  - "*.gemspec"
  - docs
  - tools
  - README.md
  - LICENSE
  - purgecss.js
  - "*.config.js"
  - "package*.json"

# 站点地图（SEO 核心，自动生成）
sitemap:
  lastmod: true
  changefreq: weekly
  priority: 0.7 # 提升优先级，利于收录